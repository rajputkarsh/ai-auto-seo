packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  # Prisma's postinstall fetches the query engine binaries; without it the CLI
  # and generated client cannot run.
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: false
  prisma: true
minimumReleaseAgeExclude:
  - '@anthropic-ai/sdk@0.112.5'
