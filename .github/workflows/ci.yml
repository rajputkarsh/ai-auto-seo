name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: lint · typecheck · test · eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Lint & format check
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      # The precision gate: fails the build if any detection rule drops
      # below threshold on the golden set.
      - name: Golden-set eval
        run: pnpm eval
